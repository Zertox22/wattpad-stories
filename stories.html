<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Univers Wattpad - Bibliothèque</title>
    <meta name="description"
        content="Découvrez tous mes livres publiés et en cours de rédaction sur Wattpad. Recherchez et filtrez par genre.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Vercel Speed Insights -->
    <script defer src="speed-insights.js"></script>
</head>

<body>
    <!-- Background glows -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="navbar">
        <a href="index.html" class="logo">
            <span class="gradient-text">Wattpad</span> <span class="thin">Stories</span>
        </a>
        <nav>
            <a href="index.html" class="nav-link"><i data-lucide="home"></i> Accueil</a>
            <a href="stories.html" class="nav-link active"><i data-lucide="book-open"></i> Histoires</a>
            <a href="planning.html" class="nav-link"><i data-lucide="calendar"></i> Planning</a>
            <a href="notifications.html" class="nav-link"><i data-lucide="bell"></i> Notifications</a>
            <a href="about.html" class="nav-link"><i data-lucide="user"></i> À Propos</a>
        </nav>
    </header>

    <main class="container">
        <!-- Stories Section -->
        <section class="section" style="padding-top: 1rem;">
            <div class="section-header">
                <div>
                    <h2 class="section-title">Bibliothèque Complète</h2>
                </div>
                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Rechercher une histoire...">
                    </div>
                    <div class="filter-tags" id="tagFilters">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>

            <div class="stories-grid" id="storiesGrid">
                <!-- Dynamically populated cards -->
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2026 Wattpad Showroom. Conçu avec passion pour les lecteurs.</p>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <a href="privacy.html" class="footer-link">Politique de confidentialité</a>
                <span style="color: var(--text-muted);">|</span>
                <button id="downloadJsonBtnPublic" class="btn btn-outline"
                    style="padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 500;"><i data-lucide="download"
                        style="width: 14px; height: 14px;"></i> Exporter les histoires (JSON)</button>
            </div>
        </footer>
    </main>

    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
